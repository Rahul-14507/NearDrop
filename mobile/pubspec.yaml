name: neardrop
description: NearDrop - Intelligent last-mile delivery recovery platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  dio: ^5.4.3
  flutter_secure_storage: ^10.0.0
  web_socket_channel: ^3.0.3
  firebase_core: any
  firebase_messaging: any
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  record: ^6.2.0
  http: ^1.2.1
  jwt_decoder: ^2.0.1
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  equatable: ^2.0.5
  get_it: ^9.2.1
  injectable: ^2.3.2
  fl_chart: ^1.2.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.4.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
